<!DOCTYPE html>
<html>
<head>
    <title>NUMBER COMPARISON Check</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 40px;
            background-color: #f5f5f5;
        }

        .box {
            background-color: white;
            border: 2px solid #333;
            width: 550px;
            margin: auto;
            padding: 25px;
            border-radius: 12px;
        }

        h1 {
            color: #333;
        }

        input[type="number"] {
            width: 100px;
            padding: 8px;
            font-size: 16px;
        }

        label {
            display: block;
            text-align: left;
            margin: 12px 20px;
            font-size: 18px;
        }

        input[type="radio"] {
            margin-right: 10px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            margin-top: 20px;
            cursor: pointer;
        }

        #result {
            margin-top: 25px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        .reason {
            margin-top: 10px;
            font-weight: normal;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>NUMBER COMPARISON Check</h1>

    <p>Enter two numbers:</p>

    <label>
        Number 1:
        <input type="number" id="num1" oninput="updateOptions()">
    </label>

    <label>
        Number 2:
        <input type="number" id="num2" oninput="updateOptions()">
    </label>


    <h3>Select the correct answer:</h3>


    <label>
        <input type="radio" name="answer" value="greater1">
        (a) <span id="optionA1">Number 1</span> is greater than 
        <span id="optionA2">Number 2</span>
    </label>


    <label>
        <input type="radio" name="answer" value="greater2">
        (b) <span id="optionB1">Number 2</span> is greater than 
        <span id="optionB2">Number 1</span>
    </label>


    <label>
        <input type="radio" name="answer" value="equal">
        (c) <span id="optionC1">Number 1</span> and 
        <span id="optionC2">Number 2</span> are equal
    </label>


    <button onclick="checkAnswer()">Check Answer</button>


    <div id="result"></div>


</div>



<script>

function formatNumber(num) {
    return Number(num).toLocaleString();
}
function updateOptions() {

    let n1 = document.getElementById("num1").value;
    let n2 = document.getElementById("num2").value;

    let displayN1 = n1 ? formatNumber(n1) : "Number 1";
    let displayN2 = n2 ? formatNumber(n2) : "Number 2";


    document.getElementById("optionA1").innerHTML = displayN1;
    document.getElementById("optionA2").innerHTML = displayN2;


    document.getElementById("optionB1").innerHTML = displayN2;
    document.getElementById("optionB2").innerHTML = displayN1;


    document.getElementById("optionC1").innerHTML = displayN1;
    document.getElementById("optionC2").innerHTML = displayN2;

}


function checkAnswer() {

    let number1 = Number(document.getElementById("num1").value);
    let number2 = Number(document.getElementById("num2").value);

    let selected = document.querySelector('input[name="answer"]:checked');

    let result = document.getElementById("result");

    if (document.getElementById("num1").value === "" ||
        document.getElementById("num2").value === "") {

        result.innerHTML = "Please enter both numbers.";
        return;
    }

    if (!selected) {
        result.innerHTML = "Please select an answer.";
        return;
    }


    let correctAnswer = "";
    let explanation = "";


    if (number1 > number2) {

        correctAnswer = "greater1";

		explanation = 
		"Since " + formatNumber(number1) + " is greater than " + formatNumber(number2) +
		", Number 1 is greater.";

    } 
    else if (number2 > number1) {

        correctAnswer = "greater2";

        explanation =
		"Since " + formatNumber(number2) + " is greater than " + formatNumber(number1) +
		", Number 2 is greater.";

    } 
    else {

        correctAnswer = "equal";

        explanation =
		"Both numbers are " + formatNumber(number1) +
		", so they are equal.";

    }


    if (selected.value === correctAnswer) {

        result.innerHTML =
        "✅ Correct Answer!<br><br>" +
        "💡 Explanation: " + explanation;

    } 
    else {

        result.innerHTML =
        "❌ Incorrect Answer.<br><br>" +
        "💡 Correct Explanation: " + explanation;

    }

}


</script>


</body>
</html>
